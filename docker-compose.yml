version: '3.9'

# WATCHDOG local development environment
# Runs all required services: PostgreSQL, Redis, Kafka, Elasticsearch, Jaeger, Grafana

networks:
  watchdog-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  kafka_data:
  elasticsearch_data:
  grafana_data:
  prometheus_data:

services:

  # ── PostgreSQL (TimescaleDB extension recommended) ─────────────────────
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: watchdog-postgres
    environment:
      POSTGRES_DB: watchdog
      POSTGRES_USER: watchdog
      POSTGRES_PASSWORD: watchdog
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - watchdog-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U watchdog"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: watchdog-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - watchdog-net
    command: redis-server --appendonly yes

  # ── Zookeeper + Kafka ──────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.3
    container_name: watchdog-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - watchdog-net

  kafka:
    image: confluentinc/cp-kafka:7.5.3
    container_name: watchdog-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - watchdog-net

  # ── Elasticsearch ──────────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: watchdog-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - watchdog-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ── Kibana ─────────────────────────────────────────────────────────────
  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    container_name: watchdog-kibana
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "5601:5601"
    networks:
      - watchdog-net

  # ── Jaeger ─────────────────────────────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:1.54
    container_name: watchdog-jaeger
    ports:
      - "16686:16686"  # Jaeger UI / Query API
      - "14268:14268"  # HTTP Collector
      - "6831:6831/udp" # UDP Compact
    environment:
      COLLECTOR_ZIPKIN_HOST_PORT: ":9411"
    networks:
      - watchdog-net

  # ── Prometheus ─────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.50.0
    container_name: watchdog-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./k8s/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - watchdog-net
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'

  # ── Grafana ────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.3.1
    container_name: watchdog-grafana
    depends_on:
      - prometheus
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: watchdog
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - watchdog-net

  # ── WATCHDOG Backend ───────────────────────────────────────────────────
  watchdog-backend:
    build:
      context: ./watchdog-backend
      dockerfile: Dockerfile
    container_name: watchdog-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      kafka:
        condition: service_started
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/watchdog
      DATABASE_USER: watchdog
      DATABASE_PASSWORD: watchdog
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BROKERS: kafka:29092
      ES_URL: http://elasticsearch:9200
      JAEGER_URL: http://jaeger:16686
      GRAFANA_URL: http://grafana:3000
      REMEDIATION_DRY_RUN: "true"
    networks:
      - watchdog-net
    restart: unless-stopped

  # ── WATCHDOG Frontend ──────────────────────────────────────────────────
  watchdog-frontend:
    build:
      context: ./watchdog-frontend
      dockerfile: Dockerfile
    container_name: watchdog-frontend
    depends_on:
      - watchdog-backend
    ports:
      - "3000:80"
    environment:
      VITE_API_URL: http://localhost:8080
    networks:
      - watchdog-net
